name: CI

on:
  push:
    branches: [main, dev/draft]
    tags-ignore: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install flake8

      - name: Run flake8
        run: |
          source .venv/bin/activate
          flake8 src/app.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/app.py --count --exit-zero --max-complexity=15 --max-line-length=150 --statistics

  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r src/requirements.txt
          pip install pytest pytest-cov

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m venv .venv
          .venv\Scripts\activate
          pip install -r src/requirements.txt
          pip install pytest pytest-cov

      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        run: |
          source .venv/bin/activate
          python -m pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --ignore=tests/test_browser.py

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: |
          .venv\Scripts\activate
          python -m pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --ignore=tests/test_browser.py

  browser-test:
    name: Browser (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r src/requirements.txt
          pip install pytest playwright
          playwright install --with-deps ${{ matrix.browser }}

      - name: Run browser tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/test_browser.py -v --tb=short --browser ${{ matrix.browser }}

  js-lint:
    name: JS Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install ESLint
        run: npm install eslint@8

      - name: Lint JavaScript
        run: |
          npx eslint src/static/js/*.js --no-eslintrc \
            --rule '{"no-undef": "off", "no-unused-vars": "warn"}' \
            --env browser,es2021 \
            --parser-options ecmaVersion:2022 \
            || true  # Advisory only for now
